<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMS - Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../common.css">
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <div id="toast-container" class="toast-container"></div>

  <div class="app-layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div class="view-wrapper">
        <section id="view-login" class="content-view active">
          <div class="auth-card">
            <h2>Sign In</h2>
            <p class="auth-subtitle">Enter your credentials to access the system</p>
            
            <form id="form-login">
              <div class="form-group">
                <label for="login-userid">User ID</label>
                <div class="input-icon-wrapper">
                  <i class="fa-regular fa-user input-icon"></i>
                  <input type="text" id="login-userid" placeholder="Enter User ID (5-20 characters)" minlength="5" maxlength="20" required autocomplete="username">
                </div>
              </div>

              <div class="form-group">
                <label for="login-password">Password</label>
                <div class="input-icon-wrapper">
                  <i class="fa-solid fa-lock input-icon"></i>
                  <input type="password" id="login-password" placeholder="Enter Password" maxlength="30" required autocomplete="current-password">
                </div>
              </div>

              <button type="submit" id="btn-login-submit" class="btn btn-primary btn-block">Log In</button>
            </form>
            
            <div class="auth-footer" style="margin-top: 20px; text-align: center; font-size: 0.9rem;">
              <p style="color: var(--text-muted);">Don't have a Customer account? <a href="../registration/registration.html" id="btn-goto-register" style="color: var(--color-primary); text-decoration: none; font-weight: 500;">Create Account</a></p>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <script src="../common.js"></script>
  <script src="login.js"></script>
</body>
</html>
