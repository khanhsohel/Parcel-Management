<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PMS - Update Shipment Status</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="../common.css">
</head>
<body>

  <div id="toast-container" class="toast-container"></div>

  <div class="app-layout">
    <div id="sidebar-placeholder"></div>
    <main class="main-content">
      <div id="header-placeholder"></div>
      <div class="view-wrapper">

        <section id="view-delivery-update" class="content-view active">
          <div class="standard-card max-width-small">
            <h2>Update Delivery Status</h2>
            <p class="section-desc">Search booking ID to update status checkpoints.</p>

            <form id="form-delivery-search" class="search-form-row">
              <input type="text" id="delivery-search-booking-id" placeholder="Enter Booking ID (12 digits)" required minlength="12" maxlength="12">
              <button type="submit" class="btn btn-primary">Find</button>
            </form>

            <div id="delivery-details-box" class="pickup-details-container" style="display: none;">
              <hr class="section-divider">
              
              <div class="parcel-preview-block" style="background-color: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color); border-radius: var(--border-radius); padding: 16px 20px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px;">
                <p><strong>Receiver Name:</strong> <span id="delivery-preview-rec">N/A</span></p>
                <p><strong>Current Status:</strong> <span class="badge" id="delivery-preview-status">N/A</span></p>
              </div>

              <form id="form-delivery-save">
                <div class="form-group">
                  <label for="delivery-status-select">Select New Status</label>
                  <select id="delivery-status-select" required>
                    <option value="Booked">Booked</option>
                    <option value="Picked up">Picked up</option>
                    <option value="In Transit">In Transit</option>
                    <option value="Delivered">Delivered</option>
                    <option value="Returned">Returned</option>
                  </select>
                </div>

                <button type="submit" id="btn-delivery-save" class="btn btn-primary btn-block">
                  Update Shipment Status
                </button>
              </form>
            </div>
          </div>
        </section>

      </div>
    </main>
  </div>

  <script src="../common.js"></script>
  <script src="delivery.js"></script>
</body>
</html>
